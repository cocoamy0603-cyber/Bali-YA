<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bali Wedding & Travel Master v18</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bali-green: #2D433D;
            --bali-gold: #C5A059;
            --bali-cream: #F9F7F2;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bali-cream);
            color: #333;
            -webkit-tap-highlight-color: transparent;
        }
        .serif { font-family: 'Noto Serif TC', serif; }
        .active-tab {
            color: var(--bali-gold);
            border-top: 3px solid var(--bali-gold);
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid rgba(197, 160, 89, 0.1);
            overflow: hidden;
            margin-bottom: 1.25rem;
        }
        .time-dot {
            position: absolute;
            left: -25px;
            top: 5px;
            width: 10px;
            height: 10px;
            background: var(--bali-gold);
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.2);
        }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .checkbox-custom {
            width: 20px;
            height: 20px;
            border: 2px solid var(--bali-gold);
            border-radius: 6px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .checkbox-custom.checked { background-color: var(--bali-gold); }
        .checkbox-custom.checked::after { content: '✓'; color: white; font-size: 12px; }
        
        .converter-bar {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .converter-input {
            background: transparent;
            border: none;
            color: white;
            font-size: 12px;
            width: 70px;
            outline: none;
            text-align: right;
        }
        .memo-img-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #f1f5f9;
            border-radius: 12px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .memo-img-container img { width: 100%; height: 100%; object-fit: cover; }
        input[type="file"] { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-24">

    <!-- Header with Currency Converter -->
    <header class="sticky top-0 z-50 bg-[#2D433D] text-white px-5 py-4 shadow-lg">
        <div class="flex justify-between items-center mb-2">
            <div>
                <h1 class="serif text-lg font-bold tracking-widest uppercase">Bali <span class="text-xs font-light italic opacity-70">Master</span></h1>
            </div>
            <div class="converter-bar">
                <i class="fa-solid fa-calculator text-[10px] text-[#C5A059]"></i>
                <input type="number" id="header-idr" placeholder="IDR 金額" class="converter-input" oninput="headerCalc(this.value)">
                <span class="text-[10px] opacity-40">➔</span>
                <span id="header-twd" class="text-xs font-bold text-[#C5A059]">NT$ 0</span>
            </div>
        </div>
        <div class="flex justify-between items-baseline opacity-50">
            <p class="text-[9px] tracking-[0.2em] uppercase">Wedding & Navigation</p>
            <p class="text-[9px]">1 TWD ≈ 476 IDR</p>
        </div>
    </header>

    <main id="app-content" class="px-5 py-6">
        <!-- Content Area -->
    </main>

    <!-- Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-stone-100 flex justify-around safe-area-bottom z-50 shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <button onclick="switchTab('plan')" class="nav-item flex flex-col items-center py-3 px-1 transition-all w-full" id="tab-plan">
            <i class="fa-solid fa-calendar-day text-lg mb-1"></i>
            <span class="text-[10px] font-bold">行程</span>
        </button>
        <button onclick="switchTab('checklist')" class="nav-item flex flex-col items-center py-3 px-1 transition-all w-full text-stone-400" id="tab-checklist">
            <i class="fa-solid fa-clipboard-list text-lg mb-1"></i>
            <span class="text-[10px] font-bold">清單</span>
        </button>
        <button onclick="switchTab('wallet')" class="nav-item flex flex-col items-center py-3 px-1 transition-all w-full text-stone-400" id="tab-wallet">
            <i class="fa-solid fa-coins text-lg mb-1"></i>
            <span class="text-[10px] font-bold">記帳</span>
        </button>
        <button onclick="switchTab('memory')" class="nav-item flex flex-col items-center py-3 px-1 transition-all w-full text-stone-400" id="tab-memory">
            <i class="fa-solid fa-camera-retro text-lg mb-1"></i>
            <span class="text-[10px] font-bold">回憶</span>
        </button>
        <button onclick="switchTab('more')" class="nav-item flex flex-col items-center py-3 px-1 transition-all w-full text-stone-400" id="tab-more">
            <i class="fa-solid fa-earth-asia text-lg mb-1"></i>
            <span class="text-[10px] font-bold">百科</span>
        </button>
    </nav>

    <script>
        // --- 核心資料 ---
        const itinerary = [
            { 
                day: 1, date: "4/1", title: "抵達與烏布初見面", 
                transport: "接機包車 (Booking ID: 155121868)",
                events: [
                    { time: "3/31 23:40", desc: "桃機搭乘酷航 TR893 前往新加坡", type: "flight" },
                    { time: "4/1 07:00", desc: "新加坡轉機 TR280 前往登帕薩 (DPS)", type: "flight" },
                    { time: "09:50", desc: "抵達峇里島機場，搭乘預約包車前往 Ubud", type: "transport" },
                    { time: "12:00", desc: "ASNA HOUSE Check-in", location: "Asna House Ubud", important: true },
                    { time: "下午", desc: "烏布市集、烏布皇宮逛逛", location: "Ubud Palace" },
                    { time: "晚上", desc: "當地按摩放鬆，迎接旅程", type: "food" }
                ] 
            },
            { 
                day: 2, date: "4/2", title: "特朗哥河泛舟與梯田", 
                transport: "08:00 飯店等候包車",
                events: [
                    { time: "08:00", desc: "飯店大廳等候包車司機", type: "important" },
                    { time: "上午", desc: "特朗哥河 (Telaga Waja River) 泛舟", location: "Telaga Waja River" },
                    { time: "下午", desc: "德哥拉朗梯田 (Tegalalang) 漫步", location: "Tegalalang Rice Terrace" },
                    { time: "傍晚", desc: "Celuk Village 銀器村參觀", location: "Celuk Village" }
                ]
            },
            { 
                day: 3, date: "4/3", title: "烏布悠閒 ➔ 婚禮前夜", 
                transport: "搭包車前往 Villa",
                events: [
                    { time: "上午", desc: "聖猴森林 (Sacred Monkey Forest) 散步", location: "Sacred Monkey Forest Sanctuary" },
                    { time: "下午", desc: "搭包車前往 Daun Lebar Villa Check-in", location: "Daun Lebar Villa", important: true },
                    { time: "晚上", desc: "婚禮前夜晚餐及表演 (Wedding Gala)", type: "important" }
                ] 
            },
            { 
                day: 4, date: "4/4", title: "婚禮盛宴 ➔ 大移動日", 
                transport: "預約全日包車 (重要)",
                events: [
                    { time: "早上", desc: "在 Daun Lebar Villa 參加婚禮儀式", type: "important" },
                    { time: "10:00", desc: "⚠️ 關鍵！準時出發前往南部 NPCC (防塞車)", type: "important" },
                    { time: "11:15", desc: "抵達 NPCC 參加婚禮宴客", location: "Nusa Pujian Convention Centre" },
                    { time: "下午", desc: "前往 Kuta JEPUN HOTEL Check-in", location: "Jepun Segara Guest House", important: true },
                    { time: "晚上", desc: "庫塔 Mall (Discovery/Lippo) 逛逛", location: "Discovery Shopping Mall" }
                ] 
            },
            { 
                day: 5, date: "4/5", title: "Waterbom 玩水日", 
                transport: "步行或短程 Grab",
                events: [
                    { time: "整天", desc: "Waterbom Bali 水上樂園狂歡", location: "Waterbom Bali", important: true },
                    { time: "晚上", desc: "庫塔區晚餐、享受沙灘氛圍", type: "food" }
                ] 
            },
            { 
                day: 6, date: "4/6", title: "最後按摩與返程", 
                transport: "全日包車 (含送機)",
                events: [
                    { time: "上午", desc: "庫塔 Mall 補貨、買伴手禮", type: "transport" },
                    { time: "13:30", desc: "飯店接送到 Lluvia Spa 進行按摩 (2hr)", location: "Lluvia Spa Bali", important: true },
                    { time: "16:00", desc: "按摩結束，直接出發接送到機場", type: "transport" },
                    { time: "17:30", desc: "抵達機場辦理報到 (TR287)", type: "important" },
                    { time: "19:40", desc: "TR287 前往新加坡樟宜機場", type: "flight" },
                    { time: "4/7 01:00", desc: "轉機 TR876 返回桃園機場", type: "flight" }
                ] 
            }
        ];

        const hotelInfo = {
            asna: {
                name: "ASNA HOUSE (Ubud)",
                address: "Jln Raya Ubud, lorong pekandelan, Ubud, Bali 80571"
            },
            jepun: {
                name: "JEPUN HOTEL (Kuta)",
                address: "Jalan Kartika, Kuta, Bali 80361"
            }
        };

        const wikiData = [
            { day: 1, name: "烏布皇宮", cat: "景點", desc: "烏布市中心地標，具有精緻的石刻藝術與傳統峇里島建築。" },
            { day: 2, name: "特朗哥河泛舟", cat: "活動", desc: "峇里島最長且刺激的泛舟路段，沿途可見瀑布與壯麗峽谷。" },
            { day: 5, name: "Waterbom Bali", cat: "活動", desc: "亞洲第一的水上樂園，設施豐富且環境優美，位於庫塔市中心。" },
            { day: 6, name: "Lluvia Spa", cat: "按摩", desc: "庫塔區知名 Spa 中心，提供多種放鬆療程，空間舒適且評價優良。" }
        ];

        // --- 狀態管理 ---
        let state = JSON.parse(localStorage.getItem('bali_v18_pro_state')) || {
            rate: 0.0021,
            expenses: [],
            dailyMemories: { 1:{text:"", img:""}, 2:{text:"", img:""}, 3:{text:"", img:""}, 4:{text:"", img:""}, 5:{text:"", img:""}, 6:{text:"", img:""} },
            checkedItems: []
        };

        function save() { localStorage.setItem('bali_v18_pro_state', JSON.stringify(state)); }

        // --- 核心邏輯 ---
        function headerCalc(val) {
            const twd = Math.round(val * state.rate);
            document.getElementById('header-twd').innerText = `NT$ ${twd.toLocaleString()}`;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('active-tab', 'text-stone-800');
                el.classList.add('text-stone-400');
            });
            document.getElementById(`tab-${tabId}`).classList.add('active-tab', 'text-stone-800');
            render(tabId);
        }

        function openMap(q) { window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`, '_blank'); }

        function handlePhoto(day, input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                state.dailyMemories[day].img = e.target.result;
                save();
                render('memory');
            };
            reader.readAsDataURL(file);
        }

        // --- 渲染引擎 ---
        function render(tabId) {
            const container = document.getElementById('app-content');
            
            if (tabId === 'plan') {
                container.innerHTML = itinerary.map(d => `
                    <div class="mb-10">
                        <div class="flex justify-between items-end mb-4">
                            <h3 class="serif text-xl font-bold text-stone-700 flex items-center">
                                <span class="bg-[#2D433D] text-white w-9 h-9 rounded-full flex items-center justify-center mr-3 text-xs italic">D${d.day}</span>
                                ${d.date} ${d.title}
                            </h3>
                        </div>
                        
                        <div class="bg-stone-100 p-3 rounded-xl mb-5 flex items-center">
                            <i class="fa-solid fa-car-side text-[#C5A059] mr-2"></i>
                            <span class="text-[10px] font-bold text-stone-600">${d.transport}</span>
                        </div>

                        <div class="ml-4 border-l-2 border-stone-200 pl-8 space-y-8">
                            ${d.events.map(e => `
                                <div class="relative">
                                    <div class="time-dot"></div>
                                    <span class="text-[9px] font-black text-stone-300 uppercase tracking-widest">${e.time || '--:--'}</span>
                                    <div class="${e.important ? 'bg-orange-50 p-3 rounded-xl border border-orange-100 shadow-sm' : ''}">
                                        <p class="text-sm font-bold text-stone-800">${e.desc}</p>
                                        ${e.location ? `<button onclick="openMap('${e.location}')" class="mt-2 text-[10px] text-blue-500 font-bold bg-white px-2 py-1 rounded shadow-sm"><i class="fa-solid fa-location-dot mr-1"></i> 地圖導航</button>` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <!-- 飯店資訊 -->
                        ${d.day === 1 ? `
                            <div class="mt-6 card p-4 bg-stone-50 border-stone-200">
                                <h4 class="text-[10px] font-bold text-stone-400 uppercase mb-2">入住飯店</h4>
                                <p class="text-xs font-bold text-stone-800">${hotelInfo.asna.name}</p>
                                <p class="text-[10px] text-stone-500 mt-1 leading-relaxed">${hotelInfo.asna.address}</p>
                            </div>
                        ` : ''}
                        ${d.day === 4 ? `
                            <div class="mt-6 card p-4 bg-stone-50 border-stone-200">
                                <h4 class="text-[10px] font-bold text-stone-400 uppercase mb-2">入住飯店</h4>
                                <p class="text-xs font-bold text-stone-800">${hotelInfo.jepun.name}</p>
                                <p class="text-[10px] text-stone-500 mt-1 leading-relaxed">${hotelInfo.jepun.address}</p>
                            </div>
                        ` : ''}
                    </div>
                `).join('');
            } else if (tabId === 'checklist') {
                container.innerHTML = `
                    <h2 class="serif text-2xl font-bold italic text-[#2D433D] mb-6">Essential Checklist</h2>
                    <div class="space-y-4">
                        ${[
                            { cat: '重要證件與紙本', items: ['護照正本', '電子機票', '訂房資訊紙本', '美金/印尼盾', '海關申報 QR'] },
                            { cat: '數位與通訊', items: ['網卡 (SIM/eSIM)', '行動電源', '手機掛繩 (防丟必備)', '萬國插頭'] },
                            { cat: '戲水與婚禮', items: ['禮服/西裝/ NuBra', '太陽眼鏡', '防水袋 (Waterbom 用)', '泳裝與換洗衣物'] },
                            { cat: '個人護理', items: ['防曬乳', '防蚊液', '常備藥品', '按摩預約單'] }
                        ].map(section => `
                            <div class="card p-5">
                                <h4 class="text-[10px] font-black text-[#C5A059] uppercase mb-3 tracking-widest">${section.cat}</h4>
                                <div class="space-y-3">
                                    ${section.items.map(item => `
                                        <div class="flex items-center" onclick="const idx=state.checkedItems.indexOf('${item}'); idx>-1?state.checkedItems.splice(idx,1):state.checkedItems.push('${item}'); save(); render('checklist')">
                                            <div class="checkbox-custom ${state.checkedItems.includes(item)?'checked':''}"></div>
                                            <span class="text-sm ${state.checkedItems.includes(item)?'text-stone-300 line-through':'text-stone-700'}">${item}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (tabId === 'wallet') {
                const total = state.expenses.reduce((s, e) => s + e.amt, 0);
                container.innerHTML = `
                    <div class="card p-6 bg-[#2D433D] text-white text-center">
                        <p class="text-[10px] opacity-60 uppercase mb-1">Total Spent</p>
                        <h3 class="text-3xl font-light mb-1">IDR ${total.toLocaleString()}</h3>
                        <p class="text-sm font-bold text-[#C5A059]">≈ NT$ ${Math.round(total * state.rate).toLocaleString()}</p>
                    </div>
                    <div class="card p-5">
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <input id="ex-item" type="text" placeholder="品項" class="bg-stone-50 p-3 rounded-xl text-sm outline-none">
                            <input id="ex-amt" type="number" placeholder="IDR" class="bg-stone-50 p-3 rounded-xl text-sm outline-none">
                        </div>
                        <button onclick="const i=document.getElementById('ex-item'); const a=document.getElementById('ex-amt'); if(i.value&&a.value){state.expenses.unshift({date:new Date().toLocaleDateString(),item:i.value,amt:parseFloat(a.value)});save();render('wallet')}" class="w-full bg-[#C5A059] text-white py-3 rounded-xl font-bold text-sm">新增紀錄</button>
                    </div>
                    <div class="space-y-3">${state.expenses.map((ex, i) => `
                        <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-stone-100">
                            <div><p class="text-[10px] text-stone-400">${ex.date}</p><p class="text-sm font-bold text-stone-800">${ex.item}</p></div>
                            <div class="text-right flex items-center gap-3">
                                <div><p class="text-sm font-black text-stone-800">${ex.amt.toLocaleString()}</p></div>
                                <button onclick="state.expenses.splice(${i},1);save();render('wallet')" class="text-stone-200"><i class="fa-solid fa-circle-xmark"></i></button>
                            </div>
                        </div>
                    `).join('')}</div>
                `;
            } else if (tabId === 'memory') {
                container.innerHTML = `
                    <h2 class="serif text-2xl font-bold italic text-[#2D433D] mb-6">Visual Memories</h2>
                    ${itinerary.map(d => `
                        <div class="card p-5">
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-xs font-bold text-[#C5A059]">DAY ${d.day} | ${d.date}</span>
                                <label class="bg-stone-100 px-3 py-1 rounded-full text-[10px] font-bold text-stone-500 cursor-pointer">上傳照片 <input type="file" onchange="handlePhoto(${d.day}, this)"></label>
                            </div>
                            <textarea oninput="state.dailyMemories[${d.day}].text=this.value; save()" class="w-full h-20 bg-stone-50 rounded-xl p-3 text-sm outline-none mb-3" placeholder="記錄今天的感動...">${state.dailyMemories[d.day].text}</textarea>
                            ${state.dailyMemories[d.day].img ? `<div class="memo-img-container"><img src="${state.dailyMemories[d.day].img}"></div>` : ''}
                        </div>
                    `).join('')}
                `;
            } else if (tabId === 'more') {
                container.innerHTML = `
                    <h2 class="serif text-2xl font-bold italic text-[#2D433D] mb-6">Wiki Guide</h2>
                    <div class="space-y-8">
                        ${wikiData.map(item => `
                            <div class="card p-5">
                                <div class="flex justify-between items-start mb-2">
                                    <h3 class="font-bold text-stone-800 text-sm">${item.name}</h3>
                                    <span class="text-[9px] bg-stone-100 text-[#C5A059] px-2 py-0.5 rounded font-bold uppercase">DAY ${item.day}</span>
                                </div>
                                <p class="text-[11px] text-stone-500 leading-relaxed mb-4 font-medium">${item.desc}</p>
                                <button onclick="openMap('${item.name}')" class="w-full border border-stone-100 text-stone-600 py-2 rounded-xl text-[10px] font-black">在地圖中查看位置</button>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
        }

        window.onload = () => switchTab('plan');
    </script>
</body>
</html>
